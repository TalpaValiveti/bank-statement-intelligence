server:
  port: 8082

spring:
  application:
    name: statement-service
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:bankstatement}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: statement
  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: statement
    create-schemas: true
    default-schema: statement
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

oci:
  tenancy-id: ${OCI_TENANCY_ID:ocid1.tenancy.oc1..aaaaaaaao6bapa2stnvoq6ss73b5mobhkeuljk4fejrwcu6ac2do4pwewbpq}
  user-id: ${OCI_USER_ID:ocid1.user.oc1..aaaaaaaap7ync37svskzajtq7h7s6umgxhm26ckzde6m7osakqsyvofvqxja}
  fingerprint: ${OCI_FINGERPRINT:a9:61:4a:f2:f7:3a:97:47:4f:b0:cd:1f:5e:c9:44:71}
  private-key-path: ${OCI_PRIVATE_KEY_PATH:/Users/talpasaivaliveti/.oci/oci_api_key.pem}
  region: ${OCI_REGION:us-chicago-1}
  bucket-name: ${OCI_BUCKET_NAME:bank-statements}
  namespace: ${OCI_NAMESPACE:ax8lnrmxv7qv}

services:
  ai-service:
    url: ${AI_SERVICE_URL:http://localhost:8083}
  alert-service:
    url: ${ALERT_SERVICE_URL:http://localhost:8084}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.bankstatement.statement: DEBUG
