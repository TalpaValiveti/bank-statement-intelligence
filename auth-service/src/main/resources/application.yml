server:
  port: 8081

spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:bankstatement}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: auth
  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: auth
    create-schemas: true
    default-schema: auth

jwt:
  secret: ${JWT_SECRET:bXlTdXBlclNlY3JldEtleUZvckJhbmtTdGF0ZW1lbnRJbnRlbGxpZ2VuY2VBcHAyMDI0}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.bankstatement.auth: DEBUG
