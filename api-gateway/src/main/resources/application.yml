server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/auth/**
        - id: statement-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/statements/**
        - id: ai-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/ai/**
        - id: alert-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/alerts/**

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    org.springframework.cloud.gateway: DEBUG