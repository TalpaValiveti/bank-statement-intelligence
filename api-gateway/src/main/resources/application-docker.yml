spring:
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://auth-service:8081
          predicates:
            - Path=/auth/**
        - id: statement-service
          uri: http://statement-service:8082
          predicates:
            - Path=/api/statements/**
        - id: ai-service
          uri: http://ai-service:8083
          predicates:
            - Path=/api/ai/**
        - id: alert-service
          uri: http://alert-service:8084
          predicates:
            - Path=/api/alerts/**
